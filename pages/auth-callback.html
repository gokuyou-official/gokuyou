<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>御供養 | 認証中</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8990S70XB8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-8990S70XB8');
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/gokuyou/js/config.js"></script>
<script src="/gokuyou/js/supabase-client.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #FF6B35;
    --primary-light: #FF8C5A;
    --primary-bg: #FFF4EF;
    --white: #FFFFFF;
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --charcoal: #3d3d3d;
    --text: #3d3d3d;
    --text2: #666677;
    --text3: #9999AA;
    --border: rgba(61,61,61,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .loading-card {
    background: var(--card);
    border-radius: 16px;
    padding: 40px 24px;
    text-align: center;
    width: 100%;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
  }

  .loading-spinner {
    width: 48px;
    height: 48px;
    border: 4px solid var(--primary-bg);
    border-top-color: var(--primary);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-msg {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.6;
  }

  .loading-sub {
    font-size: 12px;
    color: var(--text3);
    margin-top: 10px;
  }
</style>
</head>
<body>

<main class="loading-card">
  <div class="loading-spinner" id="spinner"></div>
  <p class="loading-msg" id="loading-msg">認証中...</p>
  <p class="loading-sub" id="loading-sub">少々お待ちください</p>
</main>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var msg = document.getElementById('loading-msg');
  var sub = document.getElementById('loading-sub');
  var spinner = document.getElementById('spinner');

  if (!window.supabaseClient) {
    msg.textContent = '初期化に失敗しました。';
    sub.textContent = 'ログインページへ戻ります...';
    spinner.style.display = 'none';
    setTimeout(function () {
      window.location.href = '/gokuyou/pages/login.html';
    }, 3000);
    return;
  }

  window.supabaseClient.auth.exchangeCodeForSession(window.location.search)
    .then(function (result) {
      if (result && result.error) {
        console.error(result.error);
        msg.textContent = '認証に失敗しました。';
        sub.textContent = 'ログインページへ戻ります...';
        spinner.style.display = 'none';
        setTimeout(function () {
          window.location.href = '/gokuyou/pages/login.html';
        }, 3000);
      } else {
        window.location.href = '/gokuyou/pages/profile.html';
      }
    })
    .catch(function (e) {
      console.error(e);
      msg.textContent = '認証に失敗しました。';
      sub.textContent = 'ログインページへ戻ります...';
      spinner.style.display = 'none';
      setTimeout(function () {
        window.location.href = '/gokuyou/pages/login.html';
      }, 3000);
    });
});
</script>

</body>
</html>
